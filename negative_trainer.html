<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mind & Thought — Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f5; --surface: #ffffff; --surface2: #ebebeb; --border: #dcdcdc;
  --ink: #1c1c2e; --muted: #7a7f94; --gold: #b8892a; --gold-bg: #fdf6e3;
  --green: #1a7a4a; --green-bg: #edf7f1; --red: #c0392b; --red-bg: #fdf0ee;
  --blue: #2060a8; --blue-bg: #edf3fd; --accent: #7c4dbd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
header { background: var(--ink); color: #f4efe4; padding: 17px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); }
.header-title { font-family: 'Lora', serif; font-size: 1.35rem; }
.header-title em { color: #d4aa50; }
.header-meta { font-family: 'DM Mono', monospace; font-size: 0.68rem; opacity: 0.7; }
.header-meta strong { color: #d4aa50; }
.tabs { display: flex; background: var(--surface2); border-bottom: 2px solid var(--border); padding: 0 32px; }
.tab { padding: 13px 22px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all 0.18s; }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }
.tab:hover:not(.active) { color: var(--ink); }
main { max-width: 760px; margin: 0 auto; padding: 28px 32px; }
.prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.prog-text { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); white-space: nowrap; }
.prog-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; }
.prog-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s; }
.situation-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 28px 32px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); position: relative; overflow: hidden; }
.situation-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), #d4aa50); }
.sc-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.sc-situation { font-size: 0.97rem; line-height: 1.75; color: var(--muted); margin-bottom: 10px; }
.sc-prompt { font-family: 'Lora', serif; font-style: italic; font-size: 1.18rem; color: var(--ink); line-height: 1.55; }
.reveal-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 24px 28px; margin-bottom: 16px; display: none; }
.reveal-box.show { display: block; }
.reveal-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 12px; }
.reveal-phrase { font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 600; color: var(--ink); margin-bottom: 10px; line-height: 1.3; }
.reveal-example { font-family: 'Lora', serif; font-style: italic; font-size: 0.9rem; color: var(--muted); border-left: 2px solid var(--gold); padding-left: 14px; line-height: 1.65; margin-bottom: 12px; }
.reveal-tip { font-size: 0.82rem; color: var(--blue); background: var(--blue-bg); padding: 10px 14px; border-radius: 5px; line-height: 1.55; }
.rate-row { display: flex; gap: 9px; margin-top: 14px; }
.rate-btn { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid; font-family: 'DM Mono', monospace; font-size: 0.66rem; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.rate-hard { border-color: var(--red); color: var(--red); background: transparent; }
.rate-hard:hover { background: var(--red-bg); }
.rate-ok { border-color: var(--gold); color: var(--gold); background: transparent; }
.rate-ok:hover { background: var(--gold-bg); }
.rate-easy { border-color: var(--green); color: var(--green); background: transparent; }
.rate-easy:hover { background: var(--green-bg); }
.nav-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn { padding: 9px 22px; border-radius: 5px; border: 1px solid; font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
.btn-ghost:hover { color: var(--ink); border-color: var(--muted); }
.btn-gold { background: var(--gold); color: white; border-color: var(--gold); }
.btn-gold:hover { opacity: 0.88; }
.btn-sm { padding: 6px 14px; font-size: 0.62rem; }
#m-choice { display: none; }
.choice-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 24px 28px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.choice-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.choice-q { font-size: 0.97rem; line-height: 1.7; color: var(--ink); }
.choice-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.choice-opt { padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--surface); font-size: 0.85rem; line-height: 1.5; cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; transition: all 0.15s; color: var(--ink); }
.choice-opt:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-bg); }
.choice-opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); font-weight: 600; }
.choice-opt.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.choice-opt.reveal-correct { border-color: var(--green); background: var(--green-bg); }
.choice-fb { padding: 11px 14px; border-radius: 5px; font-size: 0.84rem; line-height: 1.6; display: none; margin-bottom: 12px; }
.choice-fb.show { display: block; }
.choice-fb.ok { background: var(--green-bg); border-left: 3px solid var(--green); color: var(--green); }
.choice-fb.no { background: var(--red-bg); border-left: 3px solid var(--red); color: var(--red); }
.score-badge { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
#m-roleplay { display: none; }
.rp-scene { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 24px 28px; margin-bottom: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.rp-context { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
.rp-setup { font-size: 0.88rem; color: var(--muted); line-height: 1.65; margin-bottom: 12px; font-style: italic; }
.rp-cue { background: var(--surface2); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 6px 6px 0; font-size: 0.95rem; line-height: 1.65; color: var(--ink); }
.rp-textarea { width: 100%; min-height: 88px; padding: 13px 15px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; color: var(--ink); font-size: 0.93rem; line-height: 1.65; font-family: 'DM Sans', sans-serif; resize: vertical; outline: none; margin-bottom: 10px; transition: border 0.2s; }
.rp-textarea:focus { border-color: var(--accent); }
.rp-reveal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 20px 24px; display: none; margin-bottom: 14px; }
.rp-reveal.show { display: block; }
.rp-reveal-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 10px; }
.model-resp { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.8; color: var(--ink); margin-bottom: 10px; }
.rp-why { font-size: 0.8rem; color: var(--muted); line-height: 1.6; background: var(--blue-bg); padding: 9px 13px; border-radius: 5px; }
#m-browse { display: none; }
.br-search { width: 100%; padding: 11px 15px; font-size: 0.88rem; font-family: 'DM Sans', sans-serif; border: 1.5px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--ink); outline: none; margin-bottom: 14px; transition: border 0.2s; }
.br-search:focus { border-color: var(--gold); }
.br-count { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-bottom: 10px; }
.br-table { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.br-item { padding: 14px 18px; background: var(--surface); border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
.br-item:last-child { border-bottom: none; }
.br-item:hover { background: var(--surface2); }
.bi-phrase { font-family: 'Lora', serif; font-weight: 600; font-size: 0.95rem; color: var(--ink); }
.bi-ex { font-family: 'Lora', serif; font-style: italic; font-size: 0.8rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.bi-exp { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.bi-exp.open { display: block; }
.bi-def { font-size: 0.84rem; color: var(--ink); line-height: 1.6; margin-bottom: 8px; }
.bi-tip { font-size: 0.78rem; color: var(--blue); background: var(--blue-bg); padding: 8px 12px; border-radius: 4px; line-height: 1.5; }
@media(max-width:580px){ main { padding: 16px; } header, .tabs { padding-left: 16px; padding-right: 16px; } .choice-opts { grid-template-columns: 1fr; } .rate-row { flex-direction: column; } }
</style>
</head>
<body>

<header>
  <div class="header-title">Mind <em>&amp; Thought</em></div>
  <div class="header-meta">Done: <strong id="s-done">0</strong> &nbsp;|&nbsp; Fluent: <strong id="s-fluent">0</strong></div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('speak',this)">① Speaking Drill</button>
  <button class="tab" onclick="switchTab('choice',this)">② Right Phrase?</button>
  <button class="tab" onclick="switchTab('roleplay',this)">③ Role-Play</button>
  <button class="tab" onclick="switchTab('browse',this)">④ Browse All</button>
</div>

<main>

<!-- ① SPEAKING DRILL -->
<div id="m-speak">
  <div class="prog-row">
    <span class="prog-text" id="sp-cnt">1 / 16</span>
    <div class="prog-track"><div class="prog-fill" id="sp-prg" style="width:0%"></div></div>
    <span class="prog-text" id="sp-lbl">—</span>
  </div>
  <div class="situation-card">
    <div class="sc-label">🎯 Situation — say a natural response out loud first</div>
    <div class="sc-situation" id="sp-sit">—</div>
    <div class="sc-prompt" id="sp-prompt">—</div>
  </div>
  <div class="reveal-box" id="sp-reveal">
    <div class="reveal-label">✓ Model Phrase</div>
    <div class="reveal-phrase" id="sp-phrase">—</div>
    <div class="reveal-example" id="sp-ex">—</div>
    <div class="reveal-tip" id="sp-tip">—</div>
    <div class="rate-row">
      <button class="rate-btn rate-hard" onclick="rateSp('hard')">🔴 Couldn't say it</button>
      <button class="rate-btn rate-ok" onclick="rateSp('ok')">🟡 Said it, not fluently</button>
      <button class="rate-btn rate-easy" onclick="rateSp('easy')">🟢 Said it naturally</button>
    </div>
  </div>
  <div class="nav-row">
    <button class="btn btn-ghost" onclick="spNav(-1)">← Prev</button>
    <button class="btn btn-gold" id="sp-rev-btn" onclick="revealSp()">Reveal Phrase</button>
    <button class="btn btn-ghost" onclick="spNav(1)">Next →</button>
  </div>
  <div style="text-align:center;margin-top:10px">
    <button class="btn btn-ghost btn-sm" onclick="shuffleSp()">⇄ Shuffle order</button>
  </div>
</div>

<!-- ② RIGHT PHRASE? -->
<div id="m-choice">
  <div class="prog-row">
    <span class="prog-text" id="ch-cnt">1 / 16</span>
    <div class="prog-track"><div class="prog-fill" id="ch-prg" style="width:0%"></div></div>
    <span class="score-badge" id="ch-score">Score: 0 / 0</span>
  </div>
  <div class="choice-card">
    <div class="choice-label">📍 Which phrase fits this moment?</div>
    <div class="choice-q" id="ch-q">—</div>
  </div>
  <div class="choice-opts" id="ch-opts"></div>
  <div class="choice-fb" id="ch-fb"></div>
  <div class="nav-row">
    <button class="btn btn-ghost" id="ch-next" style="display:none" onclick="nextChoice()">Next →</button>
  </div>
</div>

<!-- ③ ROLE-PLAY -->
<div id="m-roleplay">
  <div class="prog-row">
    <span class="prog-text" id="rp-cnt">1 / 16</span>
    <div class="prog-track"><div class="prog-fill" id="rp-prg" style="width:0%"></div></div>
    <span class="prog-text" id="rp-lbl">—</span>
  </div>
  <div class="rp-scene">
    <div class="rp-context" id="rp-ctx">—</div>
    <div class="rp-setup" id="rp-setup">—</div>
    <div class="rp-cue" id="rp-cue">—</div>
  </div>
  <textarea class="rp-textarea" id="rp-ta" placeholder="Write what you would say in this situation…"></textarea>
  <div class="nav-row" style="margin-bottom:12px">
    <button class="btn btn-ghost" onclick="rpNav(-1)">← Prev</button>
    <button class="btn btn-gold" id="rp-rev-btn" onclick="revealRP()">See Model Response</button>
    <button class="btn btn-ghost" onclick="rpNav(1)">Next →</button>
  </div>
  <div class="rp-reveal" id="rp-reveal">
    <div class="rp-reveal-label">Model Response — key phrases highlighted</div>
    <div class="model-resp" id="rp-model">—</div>
    <div class="rp-why" id="rp-why">—</div>
    <div class="rate-row">
      <button class="rate-btn rate-hard" onclick="rateRP('hard')">🔴 Very different</button>
      <button class="rate-btn rate-ok" onclick="rateRP('ok')">🟡 Similar but less natural</button>
      <button class="rate-btn rate-easy" onclick="rateRP('easy')">🟢 Close to model</button>
    </div>
  </div>
</div>

<!-- ④ BROWSE -->
<div id="m-browse">
  <input class="br-search" type="text" id="br-q" placeholder="Search phrases, meanings, examples…" oninput="renderBrowse(this.value)">
  <div class="br-count" id="br-count"></div>
  <div class="br-table" id="br-list"></div>
</div>

</main>

<script>
const P = [
  {
    phrase: "Cloud your judgement",
    def: "To impair someone's ability to think clearly or decide wisely — usually because a strong emotion (fear, anger, excitement, personal attachment) is interfering with rational analysis.",
    sit: "A colleague is about to make a major career decision while still angry after a difficult performance review.",
    prompt: "Warn someone that strong emotions are preventing them from thinking about a decision clearly…",
    ex: "\"Don't make the call today — when you're this frustrated, emotions can cloud your judgement on something this important.\"",
    tip: "Very effective as a gentle, caring warning rather than a criticism. It doesn't say the person is wrong — it says their current emotional state isn't the right one to make this decision from. Also useful for self-reflection: 'I think my attachment to this deal is clouding my judgement.'",
    cq: "A colleague wants to resign immediately after a difficult conversation with his MD. He's furious and ready to send the email. You say:",
    cc: "Don't send it today. You're angry right now and that's going to cloud your judgement — give it 48 hours and see how it looks.",
    cw: ["I think you should wait before making such a big decision while you're this upset.", "It's not a good idea to resign when you're feeling this emotional about what happened.", "You should calm down first before doing something that could have serious consequences."],
    ctx: "Colleague about to resign impulsively after a bad performance review",
    setup: "Your colleague had a very difficult performance review an hour ago. He's furious and drafting a resignation email.",
    cue: "Colleague: \"I'm done. I'm sending the resignation now. I'm not spending another day working for him.\"",
    model: "Put the laptop down for a second. I understand the anger — completely — but <b>this decision is too big to make while it's clouding your judgement.</b> What you're feeling right now is real, but it's not the same as what you'll feel in 48 hours. <b>The email will still be there on Thursday. Your options right now won't.</b> Give yourself two days before you do anything irreversible.",
    why: "'The email will still be there on Thursday. Your options right now won't.' is a powerful asymmetry argument. It makes the case for waiting without dismissing the emotion — and it's the kind of thing a good friend says, not just a cautious colleague."
  },
  {
    phrase: "Put the past behind you",
    def: "To stop allowing a previous negative experience, mistake, or conflict to affect your present thinking and decisions — to consciously move forward rather than dwelling.",
    sit: "A team member is still visibly affected by a failed project six months ago and it's holding back their confidence on the new one.",
    prompt: "Encourage someone to stop being defined or limited by a past failure and move forward with fresh energy…",
    ex: "\"The last deal didn't go the way we hoped — but we need to put that behind us and focus on what's in front of us now.\"",
    tip: "Not dismissive — it acknowledges the past happened while arguing it shouldn't govern the present. Effective in team motivations, post-failure debriefs, and personal coaching conversations. Best paired with a forward-looking statement about what's possible next.",
    cq: "Six months after a difficult failed pitch, a junior analyst is still visibly hesitant and second-guessing herself. You speak to her privately:",
    cc: "It's time to put that pitch behind you — it didn't work, we learned from it, and the client in front of us now deserves your full confidence, not the shadow of something that's over.",
    cw: ["You really need to stop thinking about what happened with that pitch and move on now.", "The failed pitch is in the past and you shouldn't let it affect how you approach this one.", "I think you need to forget about what went wrong before and concentrate on the new opportunity."],
    ctx: "Private coaching conversation — helping a junior analyst regain confidence",
    setup: "Six months ago, a junior analyst's pitch went badly. She's been hesitant and over-cautious ever since. A major new pitch is coming.",
    cue: "Junior analyst: \"I keep thinking about what happened last time. What if I make the same mistakes?\"",
    model: "I want you to <b>put that behind you</b> — genuinely, not just as something I'm saying to make you feel better. We reviewed what happened, we made changes, and you've grown significantly since then. <b>The person who walked into that pitch six months ago is not the same person standing in front of me now.</b> The new client deserves your full attention and your best work — not a performance that's being filtered through something that's already over.",
    why: "'The person who walked into that pitch six months ago is not the same person standing in front of me now' is the most effective thing you can say here. It makes growth concrete and personal, which is far more convincing than generic reassurance."
  },
  {
    phrase: "Bottle up your feelings",
    def: "To suppress and conceal your emotions rather than expressing them — storing them internally in a way that creates pressure over time. Almost always used as a warning against doing this.",
    sit: "A colleague has been under enormous pressure for months and has been visibly showing strain but insisting everything is fine.",
    prompt: "Gently raise with someone that suppressing emotions instead of expressing them is unhealthy and unsustainable…",
    ex: "\"You've been bottling this up for months — it's okay to say that the workload is too much. No one expects you to be fine with all of it.\"",
    tip: "The phrase itself implies the danger — a bottle can only hold so much before it breaks. Use it warmly and carefully. It's an invitation to open up, not a criticism. Always follows with what the person can actually do or say instead.",
    cq: "A colleague who has been under extreme work pressure keeps saying he's 'fine' while clearly struggling. You speak to him privately:",
    cc: "I don't think you're fine — and I think you've been bottling all of this up for a long time. You don't have to be fine with everything that's been asked of you.",
    cw: ["I'm worried you're not being honest about how much pressure you're actually under right now.", "You seem to be keeping everything inside rather than talking about how difficult things have been.", "I think you need to start being more open about how much you're struggling with the current workload."],
    ctx: "Private welfare check-in with a colleague under sustained pressure",
    setup: "A colleague has been working 14-hour days for three months. He consistently says he's 'fine' but is visibly worn down.",
    cue: "Colleague: \"Honestly, I'm fine. It's just busy. It'll calm down.\"",
    model: "I hear you — but I don't entirely believe you, and I say that as someone who cares about you. <b>I think you've been bottling this up</b> for a while and telling yourself it's manageable because you don't want to be the one who couldn't handle it. <b>But there's no version of three months of 14-hour days that's just 'busy'.</b> You're allowed to say it's too much. That's not weakness — that's honesty. What would actually help right now?",
    why: "'You don't want to be the one who couldn't handle it' names the internal story the colleague is telling himself — which is almost always the real reason people bottle things up. Naming that story directly is what makes this conversation actually useful rather than superficially reassuring."
  },
  {
    phrase: "Lurking in the back of my mind",
    def: "A thought, concern, or question that hasn't been fully addressed — it's present but not at the forefront of your attention. It's there, persistent, just below the surface.",
    sit: "After a seemingly successful client meeting, you realise there's an unresolved question about their balance sheet that you haven't fully examined.",
    prompt: "Raise a concern or question that has been quietly present in your thinking but not yet fully addressed…",
    ex: "\"There's something that's been lurking in the back of my mind since that call — their revenue recognition policy. I'd like to understand it better before we go further.\"",
    tip: "Signals intellectual honesty and careful thinking. It's a sophisticated way to introduce a concern you haven't fully formed yet — it invites discussion rather than asserting a conclusion. Very effective in due diligence, risk reviews, and analytical conversations.",
    cq: "After two weeks of deal work, you realise there's a question about the target company's pension liabilities that nobody has fully examined. You raise it in the team meeting:",
    cc: "Something has been lurking in the back of my mind — the pension deficit. We haven't stress-tested what happens to it if rates fall further. I think we need to.",
    cw: ["I've been thinking about the pension liabilities and I'm not sure we've looked at them carefully enough.", "There's a question I haven't fully addressed yet about what happens to the pension deficit under different rate scenarios.", "I'm a bit concerned about the pension liability and I think it deserves more attention before we proceed."],
    ctx: "Deal team meeting — raising an unexamined risk",
    setup: "Two weeks into due diligence on an acquisition. The pension deficit is on the data room, noted but not stress-tested.",
    cue: "MD: \"Are we comfortable proceeding to the next phase?\"",
    model: "Almost — but there's something that's been <b>lurking in the back of my mind</b> that I want to surface before we commit. The pension deficit is noted in the data room but we haven't stress-tested what it looks like if rates fall another 100bps. <b>Given the current rate environment, that's not a hypothetical scenario — it's a plausible one.</b> I'd like two days to model it before we proceed. If it's immaterial, we move. If it's not, we need to know now rather than in exclusivity.",
    why: "'I'd like two days to model it before we proceed. If it's immaterial, we move. If it's not, we need to know now rather than in exclusivity.' This is exactly the right framing. It shows proportionality — not alarmism — and names what the cost of ignoring it would be."
  },
  {
    phrase: "Have a sneaking suspicion",
    def: "A quiet, persistent intuition about something that you can't yet fully prove — a feeling that has been growing slowly in the background of your mind.",

function spNav(d) { spIdx=(spIdx+d+P.length)%P.length; renderSp(); }
function shuffleSp() {
  for(let i=spOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[spOrder[i],spOrder[j]]=[spOrder[j],spOrder[i]];}
  spIdx=0; renderSp();
}

function renderChoice() {
  const p = P[chOrder[chIdx]];
  document.getElementById('ch-cnt').textContent = `${chIdx+1} / ${P.length}`;
  document.getElementById('ch-prg').style.width = `${(chIdx/P.length)*100}%`;
  document.getElementById('ch-q').textContent = p.cq;
  document.getElementById('ch-fb').className = 'choice-fb';
  document.getElementById('ch-next').style.display = 'none';
  chAnswered = false;
  const opts = [p.cc,...p.cw].sort(()=>Math.random()-0.5);
  const cont = document.getElementById('ch-opts');
  cont.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'choice-opt';
    btn.textContent = o;
    btn.onclick = () => pickChoice(btn, o===p.cc, p.cc);
    cont.appendChild(btn);
  });
}
function pickChoice(btn, correct, correctText) {
  if(chAnswered) return;
  chAnswered = true;
  document.querySelectorAll('.choice-opt').forEach(b => { b.disabled = true; if(b.textContent===correctText) b.classList.add('reveal-correct'); });
  if(correct){btn.classList.add('correct');chScore++;}
  else btn.classList.add('wrong');
  const fb = document.getElementById('ch-fb');
  fb.className = 'choice-fb show '+(correct?'ok':'no');
  fb.textContent = correct ? '✓ Exactly right. This is the most natural way to say it in English.' : `✗ Not quite. The most natural phrase is: "${correctText}"`;
  document.getElementById('ch-score').textContent = `Score: ${chScore} / ${chIdx+1}`;
  document.getElementById('ch-next').style.display = 'inline-block';
}
function nextChoice() { chIdx=(chIdx+1)%P.length; renderChoice(); }

function renderRP() {
  const p = P[rpOrder[rpIdx]];
  document.getElementById('rp-cnt').textContent = `${rpIdx+1} / ${P.length}`;
  document.getElementById('rp-prg').style.width = `${(rpIdx/P.length)*100}%`;
  document.getElementById('rp-lbl').textContent = p.phrase;
  document.getElementById('rp-ctx').textContent = p.ctx;
  document.getElementById('rp-setup').textContent = p.setup;
  document.getElementById('rp-cue').textContent = p.cue;
  document.getElementById('rp-ta').value = '';
  document.getElementById('rp-reveal').classList.remove('show');
  document.getElementById('rp-rev-btn').style.display = 'inline-block';
  document.getElementById('rp-model').innerHTML = p.model;
  document.getElementById('rp-why').textContent = p.why;
}
function revealRP() { document.getElementById('rp-reveal').classList.add('show'); document.getElementById('rp-rev-btn').style.display = 'none'; }
function rateRP(r) { done++; if(r==='easy') fluent++; updateStats(); rpNav(1); }
function rpNav(d) { rpIdx=(rpIdx+d+P.length)%P.length; renderRP(); }

function renderBrowse(q) {
  const lower = q.toLowerCase();
  const filtered = P.filter(p => p.phrase.toLowerCase().includes(lower) || p.def.toLowerCase().includes(lower) || p.ex.toLowerCase().includes(lower) || p.tip.toLowerCase().includes(lower));
  document.getElementById('br-count').textContent = `Showing ${filtered.length} of ${P.length} phrases`;
  const list = document.getElementById('br-list');
  list.innerHTML = '';
  filtered.forEach((p,i) => {
    const item = document.createElement('div');
    item.className = 'br-item';
    item.innerHTML = `<div class="bi-phrase">${p.phrase}</div><div class="bi-ex">${p.ex}</div><div class="bi-exp" id="bi-exp-${i}"><div class="bi-def">${p.def}</div><div class="bi-tip" style="margin-top:8px">💡 ${p.tip}</div></div>`;
    item.onclick = () => document.getElementById(`bi-exp-${i}`).classList.toggle('open');
    list.appendChild(item);
  });
}

function updateStats() {
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-fluent').textContent = fluent;
}

renderSp();
</script>
</body>
</html>
