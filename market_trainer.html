<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Positive Phrases — Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #ebebeb;
  --border: #dcdcdc;
  --ink: #1c1c2e;
  --muted: #7a7f94;
  --gold: #b8892a;
  --gold-bg: #fdf6e3;
  --green: #1a7a4a;
  --green-bg: #edf7f1;
  --red: #c0392b;
  --red-bg: #fdf0ee;
  --blue: #2060a8;
  --blue-bg: #edf3fd;
  --accent: #7c4dbd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

header {
  background: var(--ink); color: #f4efe4;
  padding: 17px 32px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--gold);
}
.header-title { font-family: 'Lora', serif; font-size: 1.35rem; }
.header-title em { color: #d4aa50; }
.header-meta { font-family: 'DM Mono', monospace; font-size: 0.68rem; opacity: 0.7; }
.header-meta strong { color: #d4aa50; }

.tabs {
  display: flex; background: var(--surface2);
  border-bottom: 2px solid var(--border);
  padding: 0 32px;
}
.tab {
  padding: 13px 22px;
  font-family: 'DM Mono', monospace; font-size: 0.7rem;
  letter-spacing: 0.07em; text-transform: uppercase;
  cursor: pointer; border: none; background: transparent;
  color: var(--muted); border-bottom: 2px solid transparent;
  margin-bottom: -2px; white-space: nowrap; transition: all 0.18s;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }
.tab:hover:not(.active) { color: var(--ink); }

main { max-width: 760px; margin: 0 auto; padding: 28px 32px; }

.prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.prog-text { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); white-space: nowrap; }
.prog-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; }
.prog-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s; }

.situation-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 28px 32px; margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06); position: relative; overflow: hidden;
}
.situation-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), #d4aa50);
}
.sc-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.sc-situation { font-size: 0.97rem; line-height: 1.75; color: var(--muted); margin-bottom: 10px; }
.sc-prompt { font-family: 'Lora', serif; font-style: italic; font-size: 1.18rem; color: var(--ink); line-height: 1.55; }

.reveal-box {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 24px 28px; margin-bottom: 16px; display: none;
}
.reveal-box.show { display: block; }
.reveal-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 12px; }
.reveal-phrase { font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 600; color: var(--ink); margin-bottom: 10px; line-height: 1.3; }
.reveal-example { font-family: 'Lora', serif; font-style: italic; font-size: 0.9rem; color: var(--muted); border-left: 2px solid var(--gold); padding-left: 14px; line-height: 1.65; margin-bottom: 12px; }
.reveal-tip { font-size: 0.82rem; color: var(--blue); background: var(--blue-bg); padding: 10px 14px; border-radius: 5px; line-height: 1.55; }

.rate-row { display: flex; gap: 9px; margin-top: 14px; }
.rate-btn { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid; font-family: 'DM Mono', monospace; font-size: 0.66rem; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.rate-hard { border-color: var(--red); color: var(--red); background: transparent; }
.rate-hard:hover { background: var(--red-bg); }
.rate-ok { border-color: var(--gold); color: var(--gold); background: transparent; }
.rate-ok:hover { background: var(--gold-bg); }
.rate-easy { border-color: var(--green); color: var(--green); background: transparent; }
.rate-easy:hover { background: var(--green-bg); }

.nav-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn { padding: 9px 22px; border-radius: 5px; border: 1px solid; font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
.btn-ghost:hover { color: var(--ink); border-color: var(--muted); }
.btn-gold { background: var(--gold); color: white; border-color: var(--gold); }
.btn-gold:hover { opacity: 0.88; }
.btn-sm { padding: 6px 14px; font-size: 0.62rem; }

#m-choice { display: none; }
.choice-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 24px 28px; margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.choice-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.choice-q { font-size: 0.97rem; line-height: 1.7; color: var(--ink); }
.choice-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.choice-opt {
  padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--surface); font-size: 0.85rem; line-height: 1.5;
  cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; color: var(--ink);
}
.choice-opt:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-bg); }
.choice-opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); font-weight: 600; }
.choice-opt.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.choice-opt.reveal-correct { border-color: var(--green); background: var(--green-bg); }
.choice-fb { padding: 11px 14px; border-radius: 5px; font-size: 0.84rem; line-height: 1.6; display: none; margin-bottom: 12px; }
.choice-fb.show { display: block; }
.choice-fb.ok { background: var(--green-bg); border-left: 3px solid var(--green); color: var(--green); }
.choice-fb.no { background: var(--red-bg); border-left: 3px solid var(--red); color: var(--red); }
.score-badge { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }

#m-roleplay { display: none; }
.rp-scene {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 24px 28px; margin-bottom: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.rp-context { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
.rp-setup { font-size: 0.88rem; color: var(--muted); line-height: 1.65; margin-bottom: 12px; font-style: italic; }
.rp-cue { background: var(--surface2); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 6px 6px 0; font-size: 0.95rem; line-height: 1.65; color: var(--ink); }
.rp-textarea {
  width: 100%; min-height: 88px; padding: 13px 15px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 6px; color: var(--ink); font-size: 0.93rem; line-height: 1.65;
  font-family: 'DM Sans', sans-serif; resize: vertical; outline: none;
  margin-bottom: 10px; transition: border 0.2s;
}
.rp-textarea:focus { border-color: var(--accent); }
.rp-reveal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 20px 24px; display: none; margin-bottom: 14px; }
.rp-reveal.show { display: block; }
.rp-reveal-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 10px; }
.model-resp { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.8; color: var(--ink); margin-bottom: 10px; }
.rp-why { font-size: 0.8rem; color: var(--muted); line-height: 1.6; background: var(--blue-bg); padding: 9px 13px; border-radius: 5px; }

#m-browse { display: none; }
.br-search {
  width: 100%; padding: 11px 15px; font-size: 0.88rem; font-family: 'DM Sans', sans-serif;
  border: 1.5px solid var(--border); border-radius: 6px; background: var(--surface);
  color: var(--ink); outline: none; margin-bottom: 14px; transition: border 0.2s;
}
.br-search:focus { border-color: var(--gold); }
.br-count { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-bottom: 10px; }
.br-table { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.br-item { padding: 14px 18px; background: var(--surface); border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
.br-item:last-child { border-bottom: none; }
.br-item:hover { background: var(--surface2); }
.bi-phrase { font-family: 'Lora', serif; font-weight: 600; font-size: 0.95rem; color: var(--ink); }
.bi-ex { font-family: 'Lora', serif; font-style: italic; font-size: 0.8rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.bi-exp { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.bi-exp.open { display: block; }
.bi-def { font-size: 0.84rem; color: var(--ink); line-height: 1.6; margin-bottom: 8px; }
.bi-tip { font-size: 0.78rem; color: var(--blue); background: var(--blue-bg); padding: 8px 12px; border-radius: 4px; line-height: 1.5; }

@media(max-width:580px){
  main { padding: 16px; }
  header, .tabs { padding-left: 16px; padding-right: 16px; }
  .choice-opts { grid-template-columns: 1fr; }
  .rate-row { flex-direction: column; }
}
</style>
</head>
<body>

<header>
  <div class="header-title">Positive <em>Phrases</em></div>
  <div class="header-meta">Done: <strong id="s-done">0</strong> &nbsp;|&nbsp; Fluent: <strong id="s-fluent">0</strong></div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('speak',this)">① Speaking Drill</button>
  <button class="tab" onclick="switchTab('choice',this)">② Right Phrase?</button>
  <button class="tab" onclick="switchTab('roleplay',this)">③ Role-Play</button>
  <button class="tab" onclick="switchTab('browse',this)">④ Browse All</button>
</div>

<main>

<!-- ① SPEAKING DRILL -->
<div id="m-speak">
  <div class="prog-row">
    <span class="prog-text" id="sp-cnt">1 / 19</span>
    <div class="prog-track"><div class="prog-fill" id="sp-prg" style="width:0%"></div></div>
    <span class="prog-text" id="sp-lbl">—</span>
  </div>
  <div class="situation-card">
    <div class="sc-label">🎯 Situation — say a natural response out loud first</div>
    <div class="sc-situation" id="sp-sit">—</div>
    <div class="sc-prompt" id="sp-prompt">—</div>
  </div>
  <div class="reveal-box" id="sp-reveal">
    <div class="reveal-label">✓ Model Phrase</div>
    <div class="reveal-phrase" id="sp-phrase">—</div>
    <div class="reveal-example" id="sp-ex">—</div>
    <div class="reveal-tip" id="sp-tip">—</div>
    <div class="rate-row">
      <button class="rate-btn rate-hard" onclick="rateSp('hard')">🔴 Couldn't say it</button>
      <button class="rate-btn rate-ok" onclick="rateSp('ok')">🟡 Said it, not fluently</button>
      <button class="rate-btn rate-easy" onclick="rateSp('easy')">🟢 Said it naturally</button>
    </div>
  </div>
  <div class="nav-row">
    <button class="btn btn-ghost" onclick="spNav(-1)">← Prev</button>
    <button class="btn btn-gold" id="sp-rev-btn" onclick="revealSp()">Reveal Phrase</button>
    <button class="btn btn-ghost" onclick="spNav(1)">Next →</button>
  </div>
  <div style="text-align:center;margin-top:10px">
    <button class="btn btn-ghost btn-sm" onclick="shuffleSp()">⇄ Shuffle order</button>
  </div>
</div>

<!-- ② RIGHT PHRASE? -->
<div id="m-choice">
  <div class="prog-row">
    <span class="prog-text" id="ch-cnt">1 / 19</span>
    <div class="prog-track"><div class="prog-fill" id="ch-prg" style="width:0%"></div></div>
    <span class="score-badge" id="ch-score">Score: 0 / 0</span>
  </div>
  <div class="choice-card">
    <div class="choice-label">📍 Which phrase fits this moment?</div>
    <div class="choice-q" id="ch-q">—</div>
  </div>
  <div class="choice-opts" id="ch-opts"></div>
  <div class="choice-fb" id="ch-fb"></div>
  <div class="nav-row">
    <button class="btn btn-ghost" id="ch-next" style="display:none" onclick="nextChoice()">Next →</button>
  </div>
</div>

<!-- ③ ROLE-PLAY -->
<div id="m-roleplay">
  <div class="prog-row">
    <span class="prog-text" id="rp-cnt">1 / 19</span>
    <div class="prog-track"><div class="prog-fill" id="rp-prg" style="width:0%"></div></div>
    <span class="prog-text" id="rp-lbl">—</span>
  </div>
  <div class="rp-scene">
    <div class="rp-context" id="rp-ctx">—</div>
    <div class="rp-setup" id="rp-setup">—</div>
    <div class="rp-cue" id="rp-cue">—</div>
  </div>
  <textarea class="rp-textarea" id="rp-ta" placeholder="Write what you would say in this situation…"></textarea>
  <div class="nav-row" style="margin-bottom:12px">
    <button class="btn btn-ghost" onclick="rpNav(-1)">← Prev</button>
    <button class="btn btn-gold" id="rp-rev-btn" onclick="revealRP()">See Model Response</button>
    <button class="btn btn-ghost" onclick="rpNav(1)">Next →</button>
  </div>
  <div class="rp-reveal" id="rp-reveal">
    <div class="rp-reveal-label">Model Response — key phrases highlighted</div>
    <div class="model-resp" id="rp-model">—</div>
    <div class="rp-why" id="rp-why">—</div>
    <div class="rate-row">
      <button class="rate-btn rate-hard" onclick="rateRP('hard')">🔴 Very different</button>
      <button class="rate-btn rate-ok" onclick="rateRP('ok')">🟡 Similar but less natural</button>
      <button class="rate-btn rate-easy" onclick="rateRP('easy')">🟢 Close to model</button>
    </div>
  </div>
</div>

<!-- ④ BROWSE -->
<div id="m-browse">
  <input class="br-search" type="text" id="br-q" placeholder="Search phrases, meanings, examples…" oninput="renderBrowse(this.value)">
  <div class="br-count" id="br-count"></div>
  <div class="br-table" id="br-list"></div>
</div>

</main>

<script>
const P = [
  {
    phrase: "It was a blast",
    def: "An incredibly fun, exciting, or enjoyable experience. More energetic and enthusiastic than 'it was great' or 'I really enjoyed it'.",
    sit: "A colleague asks how your team dinner went last night after a successful deal closing.",
    prompt: "Tell someone that a social or work event was genuinely great fun — with real energy and enthusiasm…",
    ex: "\"Thanks for organising the dinner — it was an absolute blast. Exactly what the team needed after that deal.\"",
    tip: "More vivid and personal than 'it was great'. It signals you were genuinely engaged, not just politely satisfied. Works equally well for professional events (team dinners, offsites, conferences) and personal ones.",
    cq: "Your colleague organised a team offsite that was genuinely energising and fun. They ask how you found it:",
    cc: "It was an absolute blast — I haven't laughed that much in months. And the strategy session actually produced some real ideas.",
    cw: ["I had a really good time at the offsite and thought it was very well organised.", "It was a great event — I enjoyed myself and found the sessions useful.", "I thought the offsite was very successful and the team seemed to enjoy it."],
    ctx: "Post-offsite conversation with the organiser",
    setup: "Your team just returned from a two-day offsite. It was genuinely fun and productive — a rare combination.",
    cue: "Colleague: \"So — honest opinion. Was it worth taking two days out of the office?\"",
    model: "Genuinely — <b>it was a blast.</b> I was a bit sceptical going in, because these things can feel forced, but the format worked. The strategy session on day two actually produced three ideas worth pursuing, and I haven't laughed that much with the team in a long time. <b>That combination of useful and fun is hard to get right — you got it right.</b>",
    why: "'That combination of useful and fun is hard to get right — you got it right' is the kind of specific, generous feedback that means something. It names exactly what made the event work, which is more valuable than a generic compliment."
  },
  {
    phrase: "Soaking up the atmosphere",
    def: "To immerse yourself fully in the feeling, energy, and vibe of a place — taking it all in slowly rather than rushing through it.",
    sit: "You've just returned from a business trip to Tokyo and a colleague asks what you did in your free time.",
    prompt: "Describe the pleasure of simply being present in a place and absorbing everything around you…",
    ex: "\"We didn't follow a plan — we just wandered through the old city, soaking up the atmosphere.\"",
    tip: "Implies a relaxed, present, and appreciative state. You're not ticking off tourist sites — you're genuinely experiencing a place. Slightly more poetic than 'enjoying the area' or 'looking around'.",
    cq: "A client asks what you did on your last evening in Tokyo before flying home. You'd spent it wandering through Yanaka, one of the old neighbourhoods:",
    cc: "I didn't have a plan — I just spent the evening in Yanaka, soaking up the atmosphere. Old temples, quiet streets, locals going about their evening. Perfect.",
    cw: ["I walked around one of the old neighbourhoods and had a look at the area.", "I spent the evening exploring the older part of the city which was very interesting.", "I didn't do anything specific — just had a wander around a nice neighbourhood."],
    ctx: "Casual conversation with a client — end of a business trip",
    setup: "You had a free evening in Tokyo and spent it wandering through the Yanaka district — old temples, quiet alleys, local restaurants.",
    cue: "Client: \"Did you get to see any of the city while you were here?\"",
    model: "I did — I had one free evening and I spent it in Yanaka. I didn't have any plan; I just walked and <b>soaked up the atmosphere.</b> Old wooden shopfronts, temples tucked between houses, people picking up dinner on their way home. It was completely different from the business districts. <b>Those are the evenings you remember years later.</b>",
    why: "'Those are the evenings you remember years later' is a warm, human observation that deepens the connection with the client. It says something true about the value of slowing down — and it's the kind of thing that makes a conversation memorable."
  },
  {
    phrase: "A relaxing getaway",
    def: "A short trip or holiday specifically intended to rest, recharge, and escape from the pressure of daily work. The emphasis is on rest rather than activities.",
    sit: "A colleague mentions they're exhausted after a brutal quarter and asks if you have any plans coming up.",
    prompt: "Describe a planned short holiday whose main purpose is rest and disconnection from work…",
    ex: "\"We're planning a relaxing getaway to the coast next weekend — just what we need after this quarter.\"",
    tip: "The word 'relaxing' is doing important work here — it signals the purpose is rest, not adventure or tourism. Very common in professional small talk. Often followed by 'to recharge' or 'to unplug'.",
    cq: "You've just closed a gruelling six-month deal and your MD asks what you're doing next week. You have a trip planned:",
    cc: "We've booked a relaxing getaway to the Lake District — four days, no agenda, completely off the grid. I genuinely need it.",
    cw: ["I'm going on a short holiday to the countryside next week to rest and recover.", "We've planned a trip away somewhere quiet so I can get some proper rest.", "I'm taking a few days off and going somewhere peaceful to recharge my batteries."],
    ctx: "Post-deal conversation with your MD",
    setup: "You've just closed a six-month deal. You're exhausted. You have four days in the Lake District booked.",
    cue: "MD: \"What are you doing with the time off — have you got anything planned?\"",
    model: "A <b>relaxing getaway</b> — Lake District, four days, no agenda whatsoever. No deal news, no emails, completely <b>off the grid.</b> My wife and I have been planning it since January but kept postponing it every time something came up. <b>This time we're actually going.</b>",
    why: "'We kept postponing it every time something came up — this time we're actually going' is a very human and relatable detail. It signals both the sacrifice the job requires and a healthy intention to protect personal time. MDs respect that."
  },
  {
    phrase: "Off the grid",
    def: "Completely disconnected from digital communication — no emails, no phone, no social media. In modern usage, it means deliberately making yourself unreachable for a period.",
    sit: "You're about to go on holiday and setting expectations with your team about your availability.",
    prompt: "Signal clearly that you will be completely unreachable during your upcoming time off…",
    ex: "\"I'll be completely off the grid for ten days — my out-of-office will direct everything to James.\"",
    tip: "More expressive and deliberate than 'I won't be checking emails'. It signals a full disconnection — and it's increasingly admired in professional culture as a sign of healthy boundaries. Always pair it with who will cover you.",
    cq: "You're leaving for two weeks in Japan and want to set clear expectations with your team before you go:",
    cc: "I'm going to be completely off the grid for two weeks — no email, no phone. James has full authority to make decisions in my absence.",
    cw: ["I won't be contactable during my holiday so please direct anything urgent to James.", "I'll be unavailable for the next two weeks and James will cover for me.", "I'm taking a proper break and won't be checking in — James is the contact while I'm away."],
    ctx: "Pre-holiday team briefing",
    setup: "You're leaving for a two-week trip to Japan. You want to genuinely disconnect and have briefed James fully to cover.",
    cue: "Team member: \"What's the best way to reach you if something urgent comes up while you're away?\"",
    model: "The honest answer is — don't. I'm going <b>completely off the grid</b> for two weeks. No email, no phone. <b>James has full authority to make any decision that would normally come to me</b>, and I've briefed him on everything in flight. If something truly catastrophic happens that James can't handle, he has my emergency number — but I'd ask you to reserve that for genuine emergencies. <b>Part of the reason I'm doing this is to trust the team to run without me for a fortnight.</b>",
    why: "'Part of the reason I'm doing this is to trust the team to run without me for a fortnight' is a sophisticated leadership statement. It reframes the disconnection as an act of trust in the team — which is motivating, not abandoning."
  },
  {
    phrase: "Hit the ground running",
    def: "To start something — a new role, project, or return from a break — with immediate energy, speed, and effectiveness. No warm-up period needed; results from day one.",
    sit: "You've just been promoted to lead a new team and want to signal your readiness and commitment in your first communication to them.",
    prompt: "Signal that you are ready to start immediately and with full energy — no slow start, no settling-in period…",

function switchTab(t, btn) {
  ['speak','choice','roleplay','browse'].forEach(id => {
    document.getElementById('m-'+id).style.display = 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('m-'+t).style.display = 'block';
  btn.classList.add('active');
  if (t==='choice') renderChoice();
  if (t==='roleplay') renderRP();
  if (t==='browse') renderBrowse('');
}

  const p = P[spOrder[spIdx]];
  document.getElementById('sp-cnt').textContent = `${spIdx+1} / ${P.length}`;
  document.getElementById('sp-prg').style.width = `${(spIdx/P.length)*100}%`;
  document.getElementById('sp-lbl').textContent = p.phrase;
  document.getElementById('sp-sit').textContent = p.sit;
  document.getElementById('sp-prompt').textContent = p.prompt;
  document.getElementById('sp-phrase').textContent = p.phrase;
  document.getElementById('sp-ex').textContent = p.ex;
  document.getElementById('sp-tip').textContent = p.tip;
  document.getElementById('sp-reveal').classList.remove('show');
  document.getElementById('sp-rev-btn').style.display = 'inline-block';
}
function revealSp() {
  document.getElementById('sp-reveal').classList.add('show');
  document.getElementById('sp-rev-btn').style.display = 'none';
}
function rateSp(r) { done++; if(r==='easy') fluent++; updateStats(); spNav(1); }
function spNav(d) { spIdx=(spIdx+d+P.length)%P.length; renderSp(); }
function shuffleSp() {
  for(let i=spOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[spOrder[i],spOrder[j]]=[spOrder[j],spOrder[i]];}
  spIdx=0; renderSp();
}

// ─── CHOICE ──────────────────────────────────
function renderChoice() {
  const p = P[chOrder[chIdx]];
  document.getElementById('ch-cnt').textContent = `${chIdx+1} / ${P.length}`;
  document.getElementById('ch-prg').style.width = `${(chIdx/P.length)*100}%`;
  document.getElementById('ch-q').textContent = p.cq;
  document.getElementById('ch-fb').className = 'choice-fb';
  document.getElementById('ch-next').style.display = 'none';
  chAnswered = false;
  const opts = [p.cc,...p.cw].sort(()=>Math.random()-0.5);
  const cont = document.getElementById('ch-opts');
  cont.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'choice-opt';
    btn.textContent = o;
    btn.onclick = () => pickChoice(btn, o===p.cc, p.cc);
    cont.appendChild(btn);
  });
}
function pickChoice(btn, correct, correctText) {
  if(chAnswered) return;
  chAnswered = true;
  document.querySelectorAll('.choice-opt').forEach(b => {
    b.disabled = true;
    if(b.textContent===correctText) b.classList.add('reveal-correct');
  });
  if(correct){btn.classList.add('correct');chScore++;}
  else btn.classList.add('wrong');
  const fb = document.getElementById('ch-fb');
  fb.className = 'choice-fb show '+(correct?'ok':'no');
  fb.textContent = correct
    ? '✓ Exactly right. This is the most natural way to say it in English.'
    : `✗ Not quite. The most natural phrase is: "${correctText}"`;
  document.getElementById('ch-score').textContent = `Score: ${chScore} / ${chIdx+1}`;
  document.getElementById('ch-next').style.display = 'inline-block';
}
function nextChoice() { chIdx=(chIdx+1)%P.length; renderChoice(); }

// ─── ROLE-PLAY ───────────────────────────────
function renderRP() {
  const p = P[rpOrder[rpIdx]];
  document.getElementById('rp-cnt').textContent = `${rpIdx+1} / ${P.length}`;
  document.getElementById('rp-prg').style.width = `${(rpIdx/P.length)*100}%`;
  document.getElementById('rp-lbl').textContent = p.phrase;
  document.getElementById('rp-ctx').textContent = p.ctx;
  document.getElementById('rp-setup').textContent = p.setup;
  document.getElementById('rp-cue').textContent = p.cue;
  document.getElementById('rp-ta').value = '';
  document.getElementById('rp-reveal').classList.remove('show');
  document.getElementById('rp-rev-btn').style.display = 'inline-block';
  document.getElementById('rp-model').innerHTML = p.model;
  document.getElementById('rp-why').textContent = p.why;
}
function revealRP() {
  document.getElementById('rp-reveal').classList.add('show');
  document.getElementById('rp-rev-btn').style.display = 'none';
}
function rateRP(r) { done++; if(r==='easy') fluent++; updateStats(); rpNav(1); }
function rpNav(d) { rpIdx=(rpIdx+d+P.length)%P.length; renderRP(); }

// ─── BROWSE ──────────────────────────────────
function renderBrowse(q) {
  const lower = q.toLowerCase();
  const filtered = P.filter(p =>
    p.phrase.toLowerCase().includes(lower) ||
    p.def.toLowerCase().includes(lower) ||
    p.ex.toLowerCase().includes(lower) ||
    p.tip.toLowerCase().includes(lower)
  );
  document.getElementById('br-count').textContent = `Showing ${filtered.length} of ${P.length} phrases`;
  const list = document.getElementById('br-list');
  list.innerHTML = '';
  filtered.forEach((p,i) => {
    const item = document.createElement('div');
    item.className = 'br-item';
    item.innerHTML = `
      <div class="bi-phrase">${p.phrase}</div>
      <div class="bi-ex">${p.ex}</div>
      <div class="bi-exp" id="bi-exp-${i}">
        <div class="bi-def">${p.def}</div>
        <div class="bi-tip" style="margin-top:8px">💡 ${p.tip}</div>
      </div>`;
    item.onclick = () => document.getElementById(`bi-exp-${i}`).classList.toggle('open');
    list.appendChild(item);
  });
}

// ─── STATS ───────────────────────────────────
function updateStats() {
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-fluent').textContent = fluent;
}

// ─── INIT ────────────────────────────────────
renderSp();
</script>
</body>
</html>
