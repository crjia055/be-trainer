<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Power Words — Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f5;--surface:#fff;--surface2:#ebebeb;--border:#dcdcdc;--ink:#1c1c2e;--muted:#7a7f94;--gold:#b8892a;--gold-bg:#fdf6e3;--green:#1a7a4a;--green-bg:#edf7f1;--red:#c0392b;--red-bg:#fdf0ee;--blue:#2060a8;--blue-bg:#edf3fd;--accent:#7c4dbd}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--ink);color:#f4efe4;padding:17px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold)}
.header-title{font-family:'Lora',serif;font-size:1.35rem}.header-title em{color:#d4aa50}
.header-meta{font-family:'DM Mono',monospace;font-size:.68rem;opacity:.7}.header-meta strong{color:#d4aa50}
.tabs{display:flex;background:var(--surface2);border-bottom:2px solid var(--border);padding:0 32px}
.tab{padding:13px 22px;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .18s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}.tab:hover:not(.active){color:var(--ink)}
main{padding-bottom:env(safe-area-inset-bottom,0px);max-width:760px;margin:0 auto;padding:28px 32px}
.prog-row{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.prog-text{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);white-space:nowrap}
.prog-track{flex:1;height:3px;background:var(--border);border-radius:2px}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.situation-card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:24px 28px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);position:relative;overflow:hidden}
.situation-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#d4aa50)}
.sc-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.sc-situation{font-size:.95rem;line-height:1.75;color:var(--muted);margin-bottom:10px}
.sc-prompt{font-family:'Lora',serif;font-style:italic;font-size:1.15rem;color:var(--ink);line-height:1.55}
.reveal-box{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:22px 26px;margin-bottom:16px;display:none}
.reveal-box.show{display:block}
.reveal-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
.reveal-phrase{font-family:'Lora',serif;font-size:1.4rem;font-weight:600;color:var(--ink);margin-bottom:10px}
.reveal-example{font-family:'Lora',serif;font-style:italic;font-size:.88rem;color:var(--muted);border-left:2px solid var(--gold);padding-left:14px;line-height:1.65;margin-bottom:10px}
.reveal-tip{font-size:.82rem;color:var(--blue);background:var(--blue-bg);padding:10px 14px;border-radius:5px;line-height:1.55}
.rate-row{display:flex;gap:9px;margin-top:14px}
.rate-btn{flex:1;padding:10px;border-radius:5px;border:1px solid;font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.rate-hard{border-color:var(--red);color:var(--red);background:transparent}.rate-hard:hover{background:var(--red-bg)}
.rate-ok{border-color:var(--gold);color:var(--gold);background:transparent}.rate-ok:hover{background:var(--gold-bg)}
.rate-easy{border-color:var(--green);color:var(--green);background:transparent}.rate-easy:hover{background:var(--green-bg)}
.nav-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:9px 22px;border-radius:5px;border:1px solid;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}.btn-ghost:hover{color:var(--ink);border-color:var(--muted)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn-gold:hover{opacity:.88}
.btn-sm{padding:6px 14px;font-size:.62rem}
#m-choice{display:none}
.choice-card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:24px 28px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.choice-label{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.choice-q{font-size:.95rem;line-height:1.7;color:var(--ink)}
.choice-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.choice-opt{padding:13px 16px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);font-size:.84rem;line-height:1.5;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .15s;color:var(--ink)}
.choice-opt:hover:not(:disabled){border-color:var(--gold);background:var(--gold-bg)}
.choice-opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:600}
.choice-opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.choice-opt.reveal-correct{border-color:var(--green);background:var(--green-bg)}
.choice-fb{padding:11px 14px;border-radius:5px;font-size:.84rem;line-height:1.6;display:none;margin-bottom:12px}
.choice-fb.show{display:block}.choice-fb.ok{background:var(--green-bg);border-left:3px solid var(--green);color:var(--green)}
.choice-fb.no{background:var(--red-bg);border-left:3px solid var(--red);color:var(--red)}
.score-badge{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted)}
#m-roleplay{display:none}
.rp-scene{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:24px 28px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.rp-context{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.rp-setup{font-size:.88rem;color:var(--muted);line-height:1.65;margin-bottom:12px;font-style:italic}
.rp-cue{background:var(--surface2);border-left:3px solid var(--accent);padding:12px 16px;border-radius:0 6px 6px 0;font-size:.95rem;line-height:1.65;color:var(--ink)}
.rp-textarea{width:100%;min-height:88px;padding:13px 15px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--ink);font-size:.93rem;line-height:1.65;font-family:'DM Sans',sans-serif;resize:vertical;outline:none;margin-bottom:10px;transition:border .2s}
.rp-textarea:focus{border-color:var(--accent)}
.rp-reveal{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:20px 24px;display:none;margin-bottom:14px}
.rp-reveal.show{display:block}
.rp-reveal-label{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:10px}
.model-resp{font-family:'Lora',serif;font-size:1.05rem;line-height:1.8;color:var(--ink);margin-bottom:10px}
.rp-why{font-size:.8rem;color:var(--muted);line-height:1.6;background:var(--blue-bg);padding:9px 13px;border-radius:5px}
#m-browse{display:none}
.br-search{width:100%;padding:11px 15px;font-size:.88rem;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--ink);outline:none;margin-bottom:14px;transition:border .2s}
.br-search:focus{border-color:var(--gold)}
.br-count{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);margin-bottom:10px}
.br-table{border:1px solid var(--border);border-radius:6px;overflow:hidden}
.br-item{padding:16px 18px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.br-item:last-child{border-bottom:none}.br-item:hover{background:var(--surface2)}
.bi-phrase{font-family:'Lora',serif;font-weight:600;font-size:.98rem;color:var(--ink)}
.bi-pos{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent);margin-left:8px}
.bi-ex{font-family:'Lora',serif;font-style:italic;font-size:.8rem;color:var(--muted);margin-top:3px;line-height:1.5}
.bi-exp{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.bi-exp.open{display:block}
.bi-def{font-size:.84rem;color:var(--ink);line-height:1.6;margin-bottom:8px}
.bi-forms{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.bi-form{font-family:'DM Mono',monospace;font-size:.62rem;padding:3px 9px;border-radius:12px;background:var(--surface2);border:1px solid var(--border)}
.bi-tip{font-size:.78rem;color:var(--blue);background:var(--blue-bg);padding:8px 12px;border-radius:4px;line-height:1.5}
@media(max-width:580px){main{padding-bottom:env(safe-area-inset-bottom,0px);padding:16px}header,.tabs{padding-left:16px;padding-right:16px}.choice-opts{grid-template-columns:1fr}.rate-row{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="header-title">Power <em>Words</em></div>
  <div class="header-meta">Done: <strong id="s-done">0</strong> &nbsp;|&nbsp; Fluent: <strong id="s-fluent">0</strong></div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('speak',this)">① Word Drill</button>
  <button class="tab" onclick="switchTab('choice',this)">② Right Word?</button>
  <button class="tab" onclick="switchTab('roleplay',this)">③ Role-Play</button>
  <button class="tab" onclick="switchTab('browse',this)">④ Browse All</button>
</div>
<main>
<div id="m-speak">
  <div class="prog-row">
    <span class="prog-text" id="sp-cnt">1 / 7</span>
    <div class="prog-track"><div class="prog-fill" id="sp-prg" style="width:0%"></div></div>
    <span class="prog-text" id="sp-lbl">—</span>
  </div>
  <div class="situation-card">
    <div class="sc-label">🎯 Situation — use the word naturally before revealing</div>
    <div class="sc-situation" id="sp-sit">—</div>
    <div class="sc-prompt" id="sp-prompt">—</div>
  </div>
  <div class="reveal-box" id="sp-reveal">
    <div class="reveal-label">✓ Target Word + Usage</div>
    <div class="reveal-phrase" id="sp-phrase">—</div>
    <div class="reveal-example" id="sp-ex">—</div>
    <div class="reveal-tip" id="sp-tip">—</div>
    <div class="rate-row">
      <button class="rate-btn rate-hard" onclick="rateSp('hard')">🔴 Couldn't use it</button>
      <button class="rate-btn rate-ok" onclick="rateSp('ok')">🟡 Used it, not fluently</button>
      <button class="rate-btn rate-easy" onclick="rateSp('easy')">🟢 Used it naturally</button>
    </div>
  </div>
  <div class="nav-row">
    <button class="btn btn-ghost" onclick="spNav(-1)">← Prev</button>
    <button class="btn btn-gold" id="sp-rev-btn" onclick="revealSp()">Reveal Word</button>
    <button class="btn btn-ghost" onclick="spNav(1)">Next →</button>
  </div>
  <div style="text-align:center;margin-top:10px">
    <button class="btn btn-ghost btn-sm" onclick="shuffleSp()">⇄ Shuffle order</button>
  </div>
</div>
<div id="m-choice">
  <div class="prog-row">
    <span class="prog-text" id="ch-cnt">1 / 7</span>
    <div class="prog-track"><div class="prog-fill" id="ch-prg" style="width:0%"></div></div>
    <span class="score-badge" id="ch-score">Score: 0 / 0</span>
  </div>
  <div class="choice-card">
    <div class="choice-label">📍 Which sentence uses the word correctly?</div>
    <div class="choice-q" id="ch-q">—</div>
  </div>
  <div class="choice-opts" id="ch-opts"></div>
  <div class="choice-fb" id="ch-fb"></div>
  <div class="nav-row"><button class="btn btn-ghost" id="ch-next" style="display:none" onclick="nextChoice()">Next →</button></div>
</div>
<div id="m-roleplay">
  <div class="prog-row">
    <span class="prog-text" id="rp-cnt">1 / 7</span>
    <div class="prog-track"><div class="prog-fill" id="rp-prg" style="width:0%"></div></div>
    <span class="prog-text" id="rp-lbl">—</span>
  </div>
  <div class="rp-scene">
    <div class="rp-context" id="rp-ctx">—</div>
    <div class="rp-setup" id="rp-setup">—</div>
    <div class="rp-cue" id="rp-cue">—</div>
  </div>
  <textarea class="rp-textarea" id="rp-ta" placeholder="Write what you would say — try to use the target word naturally…"></textarea>
  <div class="nav-row" style="margin-bottom:12px">
    <button class="btn btn-ghost" onclick="rpNav(-1)">← Prev</button>
    <button class="btn btn-gold" id="rp-rev-btn" onclick="revealRP()">See Model Response</button>
    <button class="btn btn-ghost" onclick="rpNav(1)">Next →</button>
  </div>
  <div class="rp-reveal" id="rp-reveal">
    <div class="rp-reveal-label">Model Response — target word highlighted</div>
    <div class="model-resp" id="rp-model">—</div>
    <div class="rp-why" id="rp-why">—</div>
    <div class="rate-row">
      <button class="rate-btn rate-hard" onclick="rateRP('hard')">🔴 Very different</button>
      <button class="rate-btn rate-ok" onclick="rateRP('ok')">🟡 Similar but less natural</button>
      <button class="rate-btn rate-easy" onclick="rateRP('easy')">🟢 Close to model</button>
    </div>
  </div>
</div>
<div id="m-browse">
  <input class="br-search" type="text" id="br-q" placeholder="Search words, meanings, examples…" oninput="renderBrowse(this.value)">
  <div class="br-count" id="br-count"></div>
  <div class="br-table" id="br-list"></div>
</div>
</main>
<script>
const P=[{word:"Pivot",pos:"verb / noun",def:"To make a deliberate, strategic change of direction — shifting focus, strategy, or approach in response to new circumstances. As a noun: the turning point itself. It implies purpose and control, not random drift.",forms:["pivot (v): 'We need to pivot our strategy'","pivoting: 'The fund is pivoting toward value'","pivoted: 'She pivoted from law into finance'","a pivot (n): 'This represents a major pivot'"],examples:[{text:"I know we planned to review the audit today, but we need to <b>pivot</b> and handle this client request first.",ctx:"meeting redirection"},{text:"With rates rising, the fund has <b>pivoted</b> away from high-growth tech toward defensive value stocks.",ctx:"investment strategy"},{text:"That's a fair point on the delay — I'd like to <b>pivot</b> to the progress we've made on implementation.",ctx:"presenting a counterpoint"},{text:"After three years in consulting, she <b>pivoted</b> into venture capital and never looked back.",ctx:"career narrative"}],sit:"You are in a quarterly strategy review. The client has been dwelling on Q2 underperformance for 20 minutes. You have strong Q3 data that reframes the picture.",prompt:"Redirect the conversation professionally from a past problem to recent progress — use 'pivot'…",ex:"\"That's a fair observation about Q2 — I'd like to pivot to what we've built since then, because I think it changes the picture significantly.\"",tip:"The key is that 'pivot' implies intention and control — you are redirecting strategically, not running away. It sounds far more deliberate and professional than 'anyway' or 'moving on'. Very effective in finance and strategy when used precisely; avoid overusing it in the startup-culture sense.",cq:"Which sentence uses 'pivot' correctly in a business context? [Target word: Pivot]",cc:"With interest rates rising sharply, the fund pivoted away from growth tech and toward dividend-paying industrials.",cw:["The team pivoted the coffee machine to face the window because the morning light was better.","She pivoted her handbag to the other shoulder during the long walk to the meeting.","He pivoted the chair so it was facing the correct direction for the video call."],ctx:"Strategy review — redirecting from Q2 setback to Q3 progress",setup:"A quarterly strategy review. The client has been dwelling on Q2 underperformance for 20 minutes. You have strong Q3 data.",cue:"Client: \"So the Q2 numbers were disappointing. I'm struggling to see how the strategy is working.\"",model:"Q2 was genuinely difficult — I don't want to gloss over that. But I'd like to <b>pivot</b> to what's happened since, because the Q3 data tells a very different story. <b>The strategy didn't fail in Q2 — it faced conditions it wasn't optimised for. What we've built since then addresses exactly those conditions.</b> Can I walk you through it?",why:"'The strategy didn't fail in Q2 — it faced conditions it wasn't optimised for' is a precise distinction that defends the strategy without denying the problem. The pivot itself is demonstrated in the response — it's not just described."},{word:"Manifest",pos:"adjective / verb",def:"As an adjective (formal): obvious, clear, and undeniable — a fact so evident it cannot be disputed. As a verb: to become visible or real; to materialise. Two different registers — the adjective is high-register formal analysis; the verb is precise and common in risk and finance contexts.",forms:["manifest (adj): 'a manifest failure'","manifest (v): 'the risk began to manifest'","manifested: 'the problem manifested slowly'","manifesting: 'risks are manifesting across the portfolio'","manifestation (n): 'a clear manifestation of'","manifestly (adv): 'this is manifestly untrue'"],examples:[{text:"The failure of the merger was a <b>manifest</b> sign that the two corporate cultures were fundamentally incompatible.",ctx:"adjective — post-mortem"},{text:"The credit risk we flagged eighteen months ago is now <b>manifesting</b> across their loan book.",ctx:"verb — risk materialising"},{text:"Her leadership qualities began to <b>manifest</b> during the crisis — that was when everyone saw what she was capable of.",ctx:"verb — qualities emerging"},{text:"This is <b>manifestly</b> not the right time to issue — the market is closed to this kind of credit.",ctx:"adverb — emphatic statement"}],sit:"In a credit committee meeting, a risk you flagged 18 months ago is now visibly damaging the company's balance sheet. You are presenting the update.",prompt:"Describe how a previously identified risk is now becoming visibly real and damaging — use 'manifest' or 'manifesting'…",ex:"\"The liquidity risk we flagged eighteen months ago is now manifesting — you can see it directly in the Q3 receivables.\"",tip:"The adjective ('a manifest failure', 'manifestly wrong') is high-register and very effective in formal analysis — it implies the evidence is so clear that disagreement would be unreasonable. The verb ('the risk is manifesting') is precise in finance — it describes a risk moving from theoretical to real. Avoid the pop-culture 'manifesting a promotion' meaning in professional settings.",cq:"Which sentence uses 'manifest' correctly in a professional context? [Target word: Manifest]",cc:"The credit risk the team flagged eighteen months ago is now manifesting across the entire loan portfolio.",cw:["The team manifest to the client that the deal would be completed by end of month.","She manifested the presentation onto the screen by pressing the projector button.","He manifested his lunch order by writing a note and leaving it on the assistant's desk."],ctx:"Credit committee — a flagged risk is now materialising in Q3 numbers",setup:"You flagged concentration risk in a client's loan book 18 months ago. The committee noted it but did not act. The risk is now in the Q3 numbers.",cue:"Committee Chair: \"Walk us through the Q3 credit update.\"",model:"The headline is that the concentration risk this team flagged eighteen months ago is now <b>manifesting</b> — and it's visible directly in Q3. The NPL ratio on the commercial real estate book has moved from 2.1% to 4.7% in one quarter. <b>This is not a surprise event; it is a predicted one that was not actioned.</b> The question today is not what happened — that's clear — but what we do in the next 90 days before it becomes a provisioning problem.",why:"'This is not a surprise event; it is a predicted one that was not actioned.' is a devastating and precise sentence. It holds the committee accountable without a blame session, and forces attention forward — the only direction that is still useful."},{word:"Ubiquitous",pos:"adjective",def:"Present, appearing, or found everywhere simultaneously — so common it seems to exist in all places at once. From Latin 'ubique' (everywhere). Implies saturation, not just frequency. Slightly more analytical than 'everywhere' — it also carries a note that something has lost its distinctiveness through overexposure.",forms:["ubiquitous (adj): 'smartphones are ubiquitous'","ubiquitously (adv): 'ubiquitously used'","ubiquity (n): 'the ubiquity of AI tools'"],examples:[{text:"Mobile payment apps are now <b>ubiquitous</b> in retail — cash has essentially disappeared in most markets.",ctx:"technology trend"},{text:"The fear of inflation is <b>ubiquitous</b> across every sector of the economy right now.",ctx:"market sentiment"},{text:"PowerPoint has become so <b>ubiquitous</b> in corporate life that people forget it's a tool, not a thought process.",ctx:"professional culture"},{text:"The <b>ubiquity</b> of ESG language in annual reports doesn't mean the underlying practices have changed.",ctx:"sceptical analysis"}],sit:"You are on a panel about technology in finance. The moderator asks whether AI is genuinely changing asset management or is mostly hype.",prompt:"Make the observation that something has become so common in your industry it is now the baseline, not a differentiator — use 'ubiquitous'…",ex:"\"AI-assisted screening tools have become ubiquitous in asset management — the question is no longer whether you use them but how well you use them.\"",tip:"More precise and elegant than 'everywhere' or 'very common'. The noun 'ubiquity' works well in analytical writing: 'the ubiquity of passive investing has changed the market structure.' Very effective for observations about technology adoption, market trends, or business culture.",cq:"Which sentence uses 'ubiquitous' correctly? [Target word: Ubiquitous]",cc:"AI-assisted screening tools have become ubiquitous across asset management — the firms that don't use them are now the exception.",cw:["The CEO was ubiquitous during the board meeting, sitting at the head of the table the whole time.","The contract was ubiquitous in its language, covering every possible scenario in detail.","She gave a ubiquitous answer to the analyst's question, covering all the main points."],ctx:"Industry panel — AI adoption in asset management",setup:"You're on a panel about technology in finance. The moderator asks whether AI is genuinely changing the industry or is mostly hype.",cue:"Moderator: \"Is AI actually changing asset management, or is it mostly a marketing story right now?\"",model:"It's already changed it — the question is whether people recognise it yet. AI-assisted screening, sentiment analysis, and risk flagging tools have become <b>ubiquitous</b> across any serious operation. <b>The firms that still treat it as a differentiator are usually the ones that adopted it late.</b> What remains genuinely differentiating is not whether you use these tools but what you do with the output — the judgement layer on top of the data. That's still very much human.",why:"'What remains genuinely differentiating is not whether you use these tools but what you do with the output.' This identifies where competitive advantage now actually sits — which is a far more sophisticated point than simply agreeing AI is important."},{word:"Magnify",pos:"verb",def:"To make something appear larger, more intense, or more significant — to amplify an existing condition. In finance and business, almost always used for risks, problems, or effects that are made greater by an additional factor such as leverage, volatility, thin liquidity, or media attention. It implies a multiplying mechanism, not just addition.",forms:["magnify (v): 'leverage can magnify losses'","magnifies: 'volatility magnifies the effect'","magnified: 'the problem was magnified by poor communication'","magnifying: 'factors magnifying the risk'"],examples:[{text:"Leverage <b>magnifies</b> investment gains — but it <b>magnifies</b> losses by exactly the same factor.",ctx:"risk explanation"},{text:"Poor internal communication <b>magnified</b> what was a minor operational snag into a full client complaint.",ctx:"post-mortem"},{text:"Social media tends to <b>magnify</b> negative sentiment in ways that move markets beyond fundamentals.",ctx:"market analysis"},{text:"The thin liquidity in that market <b>magnified</b> the price impact of a relatively small sell order.",ctx:"execution analysis"}],sit:"A leveraged fund has lost 22% in a quarter where the benchmark fell 7%. The client is upset. You need to explain the mechanism clearly.",prompt:"Explain the amplifying effect of leverage on losses — use 'magnify' or 'magnified'…",ex:"\"The leverage in this fund magnified the index's 7% drawdown into a 21% loss — the same mechanism that amplified gains in the up-years is now working in reverse.\"",tip:"More precise than 'make worse' or 'increase'. It implies a multiplying effect — the original problem exists, but something is making it appear or feel larger. Commonly paired with: leverage, volatility, poor communication, thin liquidity, media coverage. Avoid using it where there is no natural amplifying mechanism.",cq:"Which sentence uses 'magnify' correctly in a finance context? [Target word: Magnify]",cc:"The 3x leverage in the fund magnified what was a 7% market drawdown into a 21% loss for investors.",cw:["She magnified the presentation so that everyone in the back row could see the slide clearly.","The telescope magnified the stars beautifully, revealing details invisible to the naked eye.","He magnified his voice so people at the back of the conference hall could hear him."],ctx:"Client meeting — explaining leveraged fund underperformance",setup:"A leveraged fund has lost 22% in a quarter where the benchmark fell 7%. The client is upset and wants a clear explanation.",cue:"Client: \"The benchmark is down 7%. Why is my fund down 22%?\"",model:"This is the core mechanism of leverage working against you. The fund uses 3x leverage, which <b>magnifies</b> every move — up or down — by a factor of three. A 7% benchmark decline becomes a 21% loss before fees. <b>This is not a failure of strategy; it is the strategy doing exactly what it is designed to do, in an unfavourable direction.</b> The same mechanism gave you 27% when the benchmark rose 9% in Q1 last year. The question now is whether you want to maintain this leverage level going into continued volatility.",why:"'This is not a failure of strategy; it is the strategy doing exactly what it is designed to do, in an unfavourable direction.' This reframing is essential — honest, accurate, and it shifts the conversation from blame to a decision the client needs to make."},{word:"Commensurate",pos:"adjective",def:"Proportionate in size, scale, or degree — corresponding appropriately to something else. Two things are commensurate when they are in the correct proportion to each other. Often used to argue that a price, fee, reward, or risk is the right size relative to what is being offered or assumed.",forms:["commensurate (adj): 'commensurate with the risk'","commensurately (adv): 'rewarded commensurately'","incommensurate (adj): 'disproportionate' — the useful opposite"],examples:[{text:"Our fee is <b>commensurate</b> with the execution risk we are taking as sole global coordinator.",ctx:"fee justification"},{text:"The coupon must be <b>commensurate</b> with current yields to attract real-money investors.",ctx:"bond pricing"},{text:"The compensation package should be <b>commensurate</b> with the level of responsibility this role carries.",ctx:"HR / negotiation"},{text:"The penalty for a minor administrative breach seems <b>incommensurate</b> with the severity of the violation.",ctx:"regulatory challenge"}],sit:"You are negotiating your advisory fee for a complex cross-border M&A. The client CFO pushes back saying your fee is higher than their last transaction.",prompt:"Justify your fee by arguing it is proportionate to the complexity and risk of what you are taking on — use 'commensurate'…",ex:"\"Our fee is commensurate with the complexity — cross-border tax structuring, three regulatory jurisdictions, and a compressed timeline is not a standard transaction.\"",tip:"Elegant and professional — it avoids saying 'we deserve to be paid more' and instead frames the fee as a logical proportion of the value and risk involved. 'Incommensurate' is equally powerful when challenging a fee or penalty that seems disproportionate. Frequently heard in legal, financial, and regulatory contexts.",cq:"Which sentence uses 'commensurate' correctly? [Target word: Commensurate]",cc:"The advisory fee we are proposing is commensurate with the complexity of the mandate and the execution risk we are assuming.",cw:["The office was commensurate with large windows and a view of the park, which the team appreciated.","She commensurate her review by listing all the projects she had completed during the year.","The meeting was commensurate with the agenda, covering all three topics in the allotted time."],ctx:"Fee negotiation — complex cross-border M&A mandate",setup:"You're presenting your advisory fee for a cross-border M&A with three regulatory jurisdictions. The client CFO pushes back saying the fee is too high.",cue:"CFO: \"Your fee is significantly higher than what we paid on our last transaction. Why?\"",model:"Because this transaction is significantly more complex than your last one. Our fee is <b>commensurate</b> with the scope: three regulatory jurisdictions, cross-border tax structuring, a compressed timeline, and the reputational exposure of being sole advisor on a high-profile deal. <b>Your last transaction was a single-jurisdiction asset sale. This is a different category of work.</b> If you'd like, I can walk you through the fee components line by line — I'm confident each one is proportionate to what it covers.",why:"'Your last transaction was a single-jurisdiction asset sale. This is a different category of work.' is an exact, factual distinction that makes the comparison invalid on its own terms. It's not defensive — it's analytical. That tone wins fee negotiations."},{word:"Traction",pos:"noun",def:"The degree to which an idea, product, strategy, or relationship is gaining momentum, engagement, and positive response. Originally the grip of a tyre on a road — metaphorically, the degree to which something is gripping and moving forward effectively. Can be gained, lost, or built.",forms:["traction (n): 'gaining traction'","gain traction: 'the idea is gaining traction'","lose traction: 'the bid is losing traction'","get traction: 'we need to get traction with this client'","traction with: 'gaining traction with European investors'"],examples:[{text:"The ESG-linked bond is gaining significant <b>traction</b> with European investors — we're seeing strong early demand.",ctx:"deal update"},{text:"The bid started strong but it's losing <b>traction</b> now that competitors have lowered their fees.",ctx:"competitive situation"},{text:"Before we ask the board for budget, we need to demonstrate that this strategy has real <b>traction</b>.",ctx:"internal business case"},{text:"I've been trying to get <b>traction</b> with their treasury team for six months — last week was the breakthrough.",ctx:"BD update"}],sit:"You are updating your MD on a new client relationship you've been developing for six months. Last week the client finally asked for a specific proposal for the first time.",prompt:"Report that a relationship that has been slow to develop is finally starting to gain momentum — use 'traction'…",ex:"\"We're finally getting traction with their treasury team — they asked us to come back with a specific proposal, which is the first time they've engaged that concretely.\"",tip:"One of the most useful words in business development and strategy. It captures the transition from theoretical to real, from awareness to concrete engagement. Always ask: traction with whom? In what direction? Being specific makes it more powerful. 'Losing traction' is the natural opposite.",cq:"Which sentence uses 'traction' correctly in a business context? [Target word: Traction]",cc:"The new product is finally gaining traction with institutional clients — three have requested detailed term sheets this week.",cw:["The car had excellent traction on the icy road thanks to its all-weather tyres.","The meeting gained traction at exactly 2 PM when everyone had arrived and sat down.","She put traction on her argument by repeating the main points several times."],ctx:"BD update to MD — six-month relationship finally showing results",setup:"You've been cultivating a relationship with a major corporate treasury for six months. Last week they asked for a specific proposal for the first time.",cue:"MD: \"Where are we with the Mitsubishi treasury relationship?\"",model:"We're finally getting <b>traction.</b> After six months of general relationship meetings, last Thursday was the first time they asked for something specific — they want a proposal on their FX hedging programme for next year. <b>That's a meaningful shift from 'thanks for coming in' to 'show us what you'd actually do.'</b> I'd like to bring a small team in for a working session before we write anything — I want to make sure we're solving their real problem, not the one we assume they have.",why:"'That's a meaningful shift from \"thanks for coming in\" to \"show us what you'd actually do.\"' This crisp articulation of why traction matters — the transition from courtesy to genuine commercial interest — immediately tells the MD why this update is significant."},{word:"Trajectory",pos:"noun",def:"The path or direction something is moving along over time — its trend, projected course, or rate of change. Originally the curved path of a projectile. In business: the direction and pace of growth, decline, a career, or a relationship. It implies momentum and direction, not just a current snapshot.",forms:["trajectory (n): 'the growth trajectory'","on a trajectory: 'on a strong upward trajectory'","growth trajectory","career trajectory","change the trajectory: 'we need to change this trajectory'"],examples:[{text:"The company is on a steep growth <b>trajectory</b>, with revenues doubling every quarter for three years.",ctx:"investment pitch"},{text:"Looking at the current <b>trajectory</b> of housing prices, a meaningful correction in 18 months looks likely.",ctx:"market outlook"},{text:"I'm very satisfied with my career <b>trajectory</b> here — the exposure I've had in three years would have taken seven elsewhere.",ctx:"performance review"},{text:"If we don't address the cost base now, the <b>trajectory</b> of this business leads to a loss-making position within two years.",ctx:"strategic warning"}],sit:"A client CEO asks for your candid view on where their business is heading. Revenue is growing strongly but margins are compressing quarter by quarter.",prompt:"Give an honest assessment of the direction and pace at which different parts of the business are moving — use 'trajectory'…",ex:"\"The revenue trajectory looks healthy, but the margin trajectory is what I'd watch closely — costs are growing faster than revenue.\"",tip:"More precise than 'trend' because it implies both direction and rate of change — and a path that can be projected. Very common in earnings discussions, strategy reviews, and career conversations. Distinguish between different trajectories in the same business — revenue vs margin, for example — they often diverge, and spotting that divergence is the insight.",cq:"Which sentence uses 'trajectory' correctly? [Target word: Trajectory]",cc:"The revenue trajectory looks promising, but the margin trajectory is deteriorating — costs are compounding faster than sales growth.",cw:["The new hire had a strong trajectory personality that made her immediately popular with the team.","She used a trajectory approach to the negotiation, going straight to the key commercial terms.","The report was written in a trajectory style, moving from conclusion back to the supporting evidence."],ctx:"Strategic review — honest assessment of a client CEO's business outlook",setup:"A client CEO asks for your candid view on where their business is heading in two years. Revenue is growing but margins are compressing.",cue:"CEO: \"Be straight with me — where do you see this business in two years if we carry on as we are?\"",model:"The revenue <b>trajectory</b> is genuinely good — I'd expect continued double-digit growth through next year. But the margin <b>trajectory</b> is the one that concerns me. Costs are compounding faster than revenue, and if that gap doesn't close, you'll be a larger business in two years but not a more profitable one. <b>Growth without margin expansion at this stage of your cycle is a story the market will eventually penalise.</b> The question is whether you change that trajectory now — when you have options — or later, when you don't.",why:"'Growth without margin expansion at this stage of your cycle is a story the market will eventually penalise.' This is honest, forward-looking analysis a CEO needs to hear and rarely does. 'Now, when you have options, or later, when you don't' gives the CEO agency while making the urgency unmistakable."}];

let spIdx=0,spOrder=P.map((_,i)=>i),chIdx=0,chOrder=P.map((_,i)=>i),chScore=0,chAnswered=false,rpIdx=0,rpOrder=P.map((_,i)=>i),done=0,fluent=0;

function switchTab(t,btn){['speak','choice','roleplay','browse'].forEach(id=>{document.getElementById('m-'+id).style.display='none'});document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.getElementById('m-'+t).style.display='block';btn.classList.add('active');if(t==='choice')renderChoice();if(t==='roleplay')renderRP();if(t==='browse')renderBrowse('')}

function renderSp(){const p=P[spOrder[spIdx]];document.getElementById('sp-cnt').textContent=`${spIdx+1} / ${P.length}`;document.getElementById('sp-prg').style.width=`${(spIdx/P.length)*100}%`;document.getElementById('sp-lbl').textContent=p.word;document.getElementById('sp-sit').textContent=p.sit;document.getElementById('sp-prompt').textContent=p.prompt;document.getElementById('sp-phrase').textContent=p.word+' — '+p.pos;document.getElementById('sp-ex').textContent=p.ex;document.getElementById('sp-tip').textContent=p.tip;document.getElementById('sp-reveal').classList.remove('show');document.getElementById('sp-rev-btn').style.display='inline-block'}
function revealSp(){document.getElementById('sp-reveal').classList.add('show');document.getElementById('sp-rev-btn').style.display='none'}
function rateSp(r){done++;if(r==='easy')fluent++;updateStats();spNav(1)}
function spNav(d){spIdx=(spIdx+d+P.length)%P.length;renderSp()}
function shuffleSp(){for(let i=spOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[spOrder[i],spOrder[j]]=[spOrder[j],spOrder[i]]}spIdx=0;renderSp()}

function renderChoice(){const p=P[chOrder[chIdx]];document.getElementById('ch-cnt').textContent=`${chIdx+1} / ${P.length}`;document.getElementById('ch-prg').style.width=`${(chIdx/P.length)*100}%`;document.getElementById('ch-q').textContent=p.cq;document.getElementById('ch-fb').className='choice-fb';document.getElementById('ch-next').style.display='none';chAnswered=false;const opts=[p.cc,...p.cw].sort(()=>Math.random()-.5);const cont=document.getElementById('ch-opts');cont.innerHTML='';opts.forEach(o=>{const btn=document.createElement('button');btn.className='choice-opt';btn.textContent=o;btn.onclick=()=>pickChoice(btn,o===p.cc,p.cc);cont.appendChild(btn)})}
function pickChoice(btn,correct,correctText){if(chAnswered)return;chAnswered=true;document.querySelectorAll('.choice-opt').forEach(b=>{b.disabled=true;if(b.textContent===correctText)b.classList.add('reveal-correct')});if(correct){btn.classList.add('correct');chScore++}else btn.classList.add('wrong');const fb=document.getElementById('ch-fb');fb.className='choice-fb show '+(correct?'ok':'no');fb.textContent=correct?'✓ Correct. That is the precise, natural usage.':'✗ Not quite. The correct usage is: "'+correctText+'"';document.getElementById('ch-score').textContent=`Score: ${chScore} / ${chIdx+1}`;document.getElementById('ch-next').style.display='inline-block'}
function nextChoice(){chIdx=(chIdx+1)%P.length;renderChoice()}

function renderRP(){const p=P[rpOrder[rpIdx]];document.getElementById('rp-cnt').textContent=`${rpIdx+1} / ${P.length}`;document.getElementById('rp-prg').style.width=`${(rpIdx/P.length)*100}%`;document.getElementById('rp-lbl').textContent=p.word;document.getElementById('rp-ctx').textContent=p.ctx;document.getElementById('rp-setup').textContent=p.setup;document.getElementById('rp-cue').textContent=p.cue;document.getElementById('rp-ta').value='';document.getElementById('rp-reveal').classList.remove('show');document.getElementById('rp-rev-btn').style.display='inline-block';document.getElementById('rp-model').innerHTML=p.model;document.getElementById('rp-why').textContent=p.why}
function revealRP(){document.getElementById('rp-reveal').classList.add('show');document.getElementById('rp-rev-btn').style.display='none'}
function rateRP(r){done++;if(r==='easy')fluent++;updateStats();rpNav(1)}
function rpNav(d){rpIdx=(rpIdx+d+P.length)%P.length;renderRP()}

function renderBrowse(q){const lower=q.toLowerCase();const filtered=P.filter(p=>p.word.toLowerCase().includes(lower)||p.def.toLowerCase().includes(lower)||p.tip.toLowerCase().includes(lower));document.getElementById('br-count').textContent=`Showing ${filtered.length} of ${P.length} words`;const list=document.getElementById('br-list');list.innerHTML='';filtered.forEach((p,i)=>{const item=document.createElement('div');item.className='br-item';const exHTML=p.examples.map(e=>`<div style="font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--muted);margin:5px 0;line-height:1.6">${e.text} <span style="font-family:'DM Mono',monospace;font-size:.58rem;opacity:.6">[${e.ctx}]</span></div>`).join('');const formsHTML=p.forms.map(f=>`<span class="bi-form">${f}</span>`).join('');item.innerHTML=`<div style="display:flex;align-items:baseline;gap:8px"><span class="bi-phrase">${p.word}</span><span class="bi-pos">${p.pos}</span></div><div class="bi-ex" style="margin-top:4px">${p.ex}</div><div class="bi-exp" id="bi-exp-${i}"><div class="bi-def">${p.def}</div><div class="bi-forms" style="margin:10px 0">${formsHTML}</div><div style="font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px">Examples in context</div>${exHTML}<div class="bi-tip" style="margin-top:10px">💡 ${p.tip}</div></div>`;item.onclick=()=>document.getElementById(`bi-exp-${i}`).classList.toggle('open');list.appendChild(item)})}

function updateStats(){document.getElementById('s-done').textContent=done;document.getElementById('s-fluent').textContent=fluent}
renderSp();
</script>
